services:
  - type: web
    name: shopco-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopco-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@store.com
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: shopco-db
    plan: free
    region: oregon
